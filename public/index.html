<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMW Gebrauchtwagensuche</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; }

    /* ── TOP HEADER ── */
    .top-bar { background: #1c1c1c; height: 36px; display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; gap: 20px; }
    .top-bar a { color: #aaa; font-size: 12px; }
    .top-bar a:hover { color: #fff; }

    .main-header { background: #fff; border-bottom: 1px solid #e0e0e0; }
    .header-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 32px; }
    .bmw-logo { display: flex; align-items: center; gap: 12px; }
    .bmw-logo-circle {
      width: 48px; height: 48px; border-radius: 50%;
      background: conic-gradient(#1c69d4 0deg 90deg, #fff 90deg 180deg, #1c69d4 180deg 270deg, #fff 270deg 360deg);
      border: 2px solid #1c1c1c;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 900; color: #1c1c1c; letter-spacing: -0.5px;
    }
    .header-title { font-size: 20px; font-weight: 300; color: #1a1a1a; letter-spacing: -0.3px; }
    .header-title span { font-weight: 700; }
    .header-sep { width: 1px; height: 32px; background: #e0e0e0; }
    .header-nav { display: flex; gap: 24px; margin-left: auto; }
    .header-nav a { font-size: 13px; color: #555; font-weight: 500; }
    .header-nav a:hover { color: #1c69d4; }

    /* ── BREADCRUMB ── */
    .breadcrumb { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 12px 24px; }
    .breadcrumb-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 8px; align-items: center; font-size: 12px; color: #888; }
    .breadcrumb-inner span { color: #1c69d4; cursor: pointer; }
    .breadcrumb-inner span:hover { text-decoration: underline; }

    /* ── LAYOUT ── */
    .layout { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 264px 1fr; gap: 24px; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    /* ── SIDEBAR ── */
    .sidebar { }
    .sidebar-title { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
    .filter-section { background: #fff; border: 1px solid #e0e0e0; margin-bottom: 2px; }
    .filter-section-header {
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; font-size: 13px; font-weight: 600; color: #1a1a1a;
      user-select: none;
    }
    .filter-section-header:hover { background: #fafafa; }
    .filter-section-header .chevron { font-size: 10px; color: #888; transition: transform 0.2s; }
    .filter-section-header .chevron.open { transform: rotate(180deg); }
    .filter-section-body { padding: 0 16px 16px; border-top: 1px solid #f0f0f0; }
    .filter-checkbox { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 13px; color: #333; cursor: pointer; }
    .filter-checkbox input { width: 14px; height: 14px; accent-color: #1c69d4; cursor: pointer; }
    .filter-checkbox:hover { color: #1c69d4; }
    .filter-chip-row { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 10px; }
    .f-chip { padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; background: #fff; color: #333; }
    .f-chip:hover, .f-chip.on { background: #1c69d4; color: #fff; border-color: #1c69d4; }
    .range-row { display: flex; gap: 8px; padding-top: 10px; }
    .range-input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 3px; font-size: 12px; color: #333; background: #fafafa; }
    .sidebar-reset { margin-top: 12px; padding: 0 0 4px; }
    .sidebar-reset button { width: 100%; padding: 10px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 3px; font-size: 12px; color: #555; font-weight: 500; cursor: pointer; }
    .sidebar-reset button:hover { background: #eee; }

    /* ── CAR GRID ── */
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .results-count { font-size: 13px; color: #555; }
    .results-count strong { color: #1a1a1a; font-weight: 600; }
    .sort-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 3px; font-size: 13px; background: #fff; color: #333; cursor: pointer; }

    .car-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 1200px) { .car-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px) { .car-grid { grid-template-columns: 1fr; } }

    /* ── CAR CARD ── */
    .car-card { background: #fff; border: 1px solid #e0e0e0; cursor: pointer; transition: box-shadow 0.2s; }
    .car-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card-img { position: relative; height: 190px; overflow: hidden; background: #f0f0f0; display: flex; align-items: center; justify-content: center; }
    .card-img svg { width: 100%; height: 100%; }
    .card-badge { position: absolute; top: 10px; left: 10px; background: #1c69d4; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; letter-spacing: 0.3px; }
    .card-badge.ps { background: #1a1a1a; }
    .card-risk { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 4px; }
    .risk-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.6); }
    .card-body { padding: 14px 14px 0; }
    .card-dealer { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .card-model { font-size: 14px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
    .card-edition { font-size: 12px; color: #555; margin-top: 2px; }
    .card-type-badge { display: inline-block; margin-top: 8px; background: #f0f0f0; border: 1px solid #ddd; font-size: 10px; font-weight: 600; padding: 2px 8px; color: #555; letter-spacing: 0.3px; }
    .card-price { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-top: 10px; }
    .card-price span { font-size: 11px; font-weight: 400; color: #888; }
    .card-rate { font-size: 12px; color: #1c69d4; margin-top: 3px; }
    .card-specs { margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 8px; }
    .card-spec-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; font-size: 12px; }
    .card-spec-row:not(:last-child) { border-bottom: 1px solid #f8f8f8; }
    .cs-label { color: #1c69d4; font-weight: 400; }
    .cs-val { color: #222; font-weight: 500; text-align: right; }
    .card-spec-item strong { font-size: 12px; font-weight: 600; color: #1a1a1a; }
    .card-footer { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f2f2f2; margin-top: 12px; }
    .card-service { font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; }
    .card-service::before { content: '✓'; color: #27ae60; font-weight: 700; }
    .card-btn { background: #1c69d4; color: #fff; border: none; padding: 9px 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }
    .card-btn:hover { background: #1557b8; }

    /* ── SVG CAR ── */
    .car-svg-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 16px; }

    /* ── DETAIL PAGE ── */
    .detail-wrap { max-width: 1400px; margin: 0 auto; padding: 0 24px 40px; }
    .detail-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #1c69d4; cursor: pointer; padding: 16px 0; font-weight: 500; }
    .detail-back:hover { opacity: 0.75; }
    .detail-grid { display: grid; grid-template-columns: 1fr 380px; gap: 32px; }
    @media (max-width: 960px) { .detail-grid { grid-template-columns: 1fr; } }

    /* image gallery */
    .gallery { background: #fff; border: 1px solid #e0e0e0; margin-bottom: 24px; }
    .gallery-main { position: relative; height: 380px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; overflow: hidden; }
    .gallery-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.85); border: 1px solid #ddd; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; z-index: 2; }
    .gallery-arrow.left { left: 12px; }
    .gallery-arrow.right { right: 12px; }
    .gallery-dots { display: flex; justify-content: center; gap: 6px; padding: 12px; background: #fff; border-top: 1px solid #f0f0f0; }
    .gallery-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; cursor: pointer; }
    .gallery-dot.active { background: #1c69d4; }

    /* detail sections */
    .detail-section { background: #fff; border: 1px solid #e0e0e0; margin-bottom: 12px; }
    .ds-header { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
    .ds-header h3 { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #1a1a1a; }
    .ds-body { padding: 20px; }
    .ds-row { display: flex; gap: 40px; flex-wrap: wrap; }
    .ds-field { min-width: 140px; }
    .ds-field label { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 4px; }
    .ds-field span { font-size: 13px; color: #1a1a1a; font-weight: 500; }
    .color-swatch { display: flex; align-items: center; gap: 8px; }
    .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #ddd; }
    .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
    .feature-item { font-size: 12px; color: #333; padding: 4px 0; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 6px; }
    .feature-item::before { content: '·'; color: #1c69d4; font-size: 18px; line-height: 1; }
    .accident-card { border-left: 3px solid #aac4e0; background: #f4f8fc; padding: 14px 16px; margin-bottom: 10px; }
    .accident-card h4 { font-size: 13px; font-weight: 700; color: #1c5a8a; }
    .accident-card p { font-size: 12px; color: #666; margin-top: 4px; }
    .accident-card .cost { font-size: 12px; font-weight: 700; color: #2c7bb6; margin-top: 6px; }
    .no-accident { color: #27ae60; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

    /* ── SIDEBAR / PRICE CARD ── */
    .price-card { background: #fff; border: 1px solid #e0e0e0; margin-bottom: 12px; }
    .pc-head { padding: 20px; border-bottom: 1px solid #f0f0f0; }
    .pc-dealer { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .pc-model { font-size: 18px; font-weight: 700; line-height: 1.25; color: #1a1a1a; }
    .pc-edition { font-size: 12px; color: #666; margin-top: 3px; }
    .pc-body { padding: 20px; }
    .pc-rate-row { background: #f8f8f8; border: 1px solid #eee; padding: 12px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .pc-rate-label { font-size: 11px; color: #888; }
    .pc-rate-val { font-size: 15px; font-weight: 700; color: #1c69d4; }
    .pc-mwst { font-size: 11px; color: #888; padding: 8px 0; border-bottom: 1px solid #f0f0f0; margin-bottom: 12px; }
    .pc-price { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .pc-price-note { font-size: 11px; color: #888; margin-bottom: 16px; }
    .btn-contact { width: 100%; padding: 14px; background: #1c69d4; color: #fff; border: none; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; }
    .btn-contact:hover { background: #1557b8; }
    .btn-call { width: 100%; padding: 12px; background: #fff; color: #1a1a1a; border: 2px solid #1a1a1a; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .btn-call:hover { background: #f5f5f5; }
    .btn-ki {
      width: 100%; padding: 14px; background: #fff; border: 2px solid #1c69d4;
      color: #1c69d4; font-size: 14px; font-weight: 700; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .btn-ki:hover { background: #1c69d4; color: #fff; }
    .pc-tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 12px; }
    .pc-tab { flex: 1; padding: 10px 0; background: none; border: none; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .pc-tab.active { color: #1a1a1a; font-weight: 700; border-bottom-color: #1a1a1a; }
    .pc-contact { border-top: 1px solid #f0f0f0; padding: 14px 20px; }
    .pc-contact-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 8px; }
    .pc-contact-name { font-size: 13px; font-weight: 600; }
    .pc-contact-tel { font-size: 13px; color: #1c69d4; margin-top: 2px; }
    .pc-specs { border-top: 1px solid #f0f0f0; }
    .pc-spec-row { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid #f8f8f8; font-size: 12px; }
    .pc-spec-key { color: #888; }
    .pc-spec-val { font-weight: 600; color: #1a1a1a; }

    /* ── KOSTEN & MARKTPREIS ── */
    .cost-table { background: #f8f9fc; border: 1px solid #e0e8f0; padding: 16px; margin-bottom: 8px; }
    .cost-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid #eef2f8; font-size: 13px; }
    .cost-row:last-child { border-bottom: none; }
    .cost-row.total { font-weight: 700; padding-top: 10px; border-top: 2px solid #1c69d4; border-bottom: none; font-size: 14px; }
    .cost-label { color: #555; }
    .cost-val { font-weight: 600; color: #1a1a1a; text-align: right; }
    .age-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .age-tab { flex: 1; padding: 7px 0; background: #f0f0f0; border: none; font-size: 11px; font-weight: 600; cursor: pointer; color: #666; }
    .age-tab.active { background: #1c69d4; color: #fff; }
    .market-box { display: flex; align-items: flex-start; gap: 12px; background: #f0fdf4; border: 1px solid #b7e4c7; padding: 14px 16px; margin-bottom: 8px; }
    .market-badge-good { background: #27ae60; color: #fff; font-size: 11px; font-weight: 800; padding: 4px 8px; white-space: nowrap; flex-shrink: 0; }
    .market-badge-neutral { background: #888; color: #fff; font-size: 11px; font-weight: 800; padding: 4px 8px; white-space: nowrap; flex-shrink: 0; }
    .market-text { font-size: 13px; color: #1a1a1a; font-weight: 600; }
    .market-sub { font-size: 11px; color: #666; margin-top: 3px; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: #fff; width: 100%; max-width: 760px; max-height: 90vh; overflow-y: auto; border-radius: 2px; }
    .modal-header { background: #1a1a1a; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .modal-header h2 { font-size: 16px; font-weight: 700; color: #fff; }
    .modal-header .modal-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
    .modal-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; line-height: 1; padding: 4px; }
    .modal-close:hover { color: #1c69d4; }
    .modal-body { padding: 24px; }

    /* findings in modal */
    .finding-card { padding: 14px 16px; border-left: 4px solid; margin-bottom: 10px; }
    .finding-card.red    { border-color: #1a6b3a; background: #edf7f0; }
    .finding-card.orange { border-color: #27ae60; background: #f0fdf4; }
    .finding-card.yellow { border-color: #52c47a; background: #f5fef7; }
    .finding-card.green  { border-color: #a9dfbf; background: #f9fffe; }
    .finding-flag { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    .finding-card.red    .finding-flag { color: #1a6b3a; }
    .finding-card.orange .finding-flag { color: #1e8449; }
    .finding-card.yellow .finding-flag { color: #27ae60; }
    .finding-card.green  .finding-flag { color: #52c47a; }
    .finding-msg { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-top: 4px; }
    .finding-tip { font-size: 12px; color: #666; margin-top: 3px; }
    .modal-section-title { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #888; margin: 20px 0 12px; }
    .ai-text { background: #f8f9fc; border: 1px solid #e0e8f0; padding: 20px; font-size: 13px; line-height: 1.75; color: #1a1a1a; white-space: pre-wrap; border-radius: 2px; font-family: inherit; }
    .modal-spinner { text-align: center; padding: 40px; }
    .modal-spinner .sp { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #1c69d4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    .modal-spinner p { font-size: 13px; color: #888; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 2px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
    .modal-badge.demo { background: #fff3cd; color: #856404; }
    .modal-badge.live { background: #d1edde; color: #155724; }

    /* ── IMAGE SWIPER (card) ── */
    .card-img-swiper { position: relative; height: 190px; overflow: hidden; background: #eee; cursor: pointer; }
    .swiper-track { display: flex; height: 100%; transition: transform 0.35s ease; }
    .swiper-slide { min-width: 100%; height: 100%; overflow: hidden; position: relative; }
    .swiper-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .swiper-slide .img-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .swiper-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 3; }
    .swiper-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.6); border: none; padding: 0; cursor: pointer; transition: background 0.2s; }
    .swiper-dot.on { background: #fff; }
    .swiper-arr { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; color: #333; z-index: 3; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
    .swiper-arr:hover { background: #fff; }
    .swiper-arr.l { left: 8px; }
    .swiper-arr.r { right: 8px; }
    .img-label { position: absolute; bottom: 24px; right: 8px; background: rgba(0,0,0,0.55); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; z-index: 3; }

    /* ── CHAT PANEL ── */
    .chat-toggle-btn { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 11px 18px; background: #fff; border: 1px solid #d0d0d0; color: #1a1a1a; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; text-align: left; }
    .chat-toggle-btn:hover { border-color: #1c69d4; color: #1c69d4; }
    .chat-toggle-btn .ct-icon { font-size: 15px; }
    .chat-toggle-btn .ct-chevron { margin-left: auto; font-size: 11px; color: #999; }
    /* ── FLOATING CHAT ── */
    .fchat-bubble { position:fixed; bottom:24px; right:24px; width:54px; height:54px; border-radius:50%; background:#1c69d4; border:none; color:#fff; font-size:22px; cursor:pointer; box-shadow:0 4px 18px rgba(28,105,212,0.45); z-index:600; display:flex; align-items:center; justify-content:center; transition:transform 0.15s; }
    .fchat-bubble:hover { transform:scale(1.08); background:#1557b8; }
    .fchat-win { position:fixed; bottom:88px; right:24px; width:360px; height:520px; background:#fff; box-shadow:0 8px 36px rgba(0,0,0,0.22); display:flex; flex-direction:column; z-index:600; border-radius:4px 4px 0 0; overflow:hidden; }
    .fchat-head { background:#1c69d4; color:#fff; padding:13px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .fchat-head h3 { margin:0; font-size:14px; color:#fff; font-weight:700; }
    .fchat-head-sub { font-size:11px; opacity:0.75; }
    .fchat-close { background:none; border:none; color:#fff; font-size:16px; cursor:pointer; margin-left:auto; opacity:0.8; line-height:1; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const API = '';

function fmtKm(n) { return n.toLocaleString('de-DE') + ' km'; }
function fmtPrice(n) { return n.toLocaleString('de-DE', { minimumFractionDigits: 2 }) + ' €'; }
function fmtYear(y) { return y.toString(); }
function age(y) { return new Date().getFullYear() - y; }
function monthlyRate(price) { return Math.round(price / 60 * 1.04).toLocaleString('de-DE'); }

function calcPreisAmpel(car) {
  const a = age(car.yearBuilt);
  const refs = {'118':35000,'120':38000,'218':38000,'220':42000,'318':42000,'320':45000,'330':52000,'418':48000,'420':50000,'430':56000,'518':52000,'520':58000,'530':65000,'730':90000,'750':105000,'M3':85000,'M4':82000,'M5':110000,'X3':52000,'X5':74000,'X6':80000};
  let base = 35000;
  for (const [k, v] of Object.entries(refs)) { if (car.name.includes(k)) { base = v; break; } }
  let exp = base;
  for (let y = 0; y < Math.min(a, 15); y++) exp *= y===0 ? 0.85 : y<5 ? 0.90 : 0.92;
  exp -= (car.km - a * 13000) * 0.06;
  if ((car.accidents||[]).length) exp *= 0.88;
  if (car.owners > 2) exp *= 0.96;
  if (!car.maintenanceRecords) exp *= 0.93;
  exp = Math.max(Math.round(exp / 100) * 100, 1000);
  const diff = Math.round((car.price - exp) / exp * 100);
  if (diff <= -12) return { status: 'gut', label: Math.abs(diff) + '% unter Marktwert', exp };
  if (diff >= 12) return { status: 'teuer', label: diff + '% über Marktwert', exp };
  return { status: 'normal', label: 'Marktwert (±12%)', exp };
}

function calcRisikoScore(car) {
  const a = age(car.yearBuilt);
  let s = 10;
  s -= (car.accidents||[]).length * 2;
  if (car.owners > Math.ceil(a / 3)) s -= 1;
  if (!car.maintenanceRecords) s -= 2;
  if (car.km > a * 18000) s -= 1;
  if (['Euro 5','Euro 4','Euro 3'].includes(car.emission)) s -= 1;
  return Math.max(1, Math.min(10, s));
}

function calcJahreskosten(car) {
  const cons = parseFloat((car.consumption||'7').replace(',','.'));
  const fuelP = car.fuel==='Diesel' ? 1.75 : car.fuel==='Elektro' ? 0.35 : 1.85;
  const fuel = Math.round(cons * 15000 / 100 * fuelP);
  const kw = parseInt(car.enginePower) || 100;
  const ins = kw<100 ? 600 : kw<200 ? 900 : kw<300 ? 1400 : 2000;
  const isM = /M[2-9]|\bM3\b|\bM4\b|\bM5\b/.test(car.name);
  const svc = isM ? 1200 : age(car.yearBuilt) > 8 ? 800 : 500;
  return { fuel, insurance: ins, service: svc, total: fuel + ins + svc };
}

function calcVerhandlungsTipp(car) {
  const flags = [];
  if ((car.accidents||[]).length) flags.push((car.accidents.length) + ' Unfall (–10–20%)');
  if (car.owners > 2) flags.push(car.owners + ' Vorbesitzer (–5%)');
  if (!car.maintenanceRecords) flags.push('kein Service (–8%)');
  if (car.km > age(car.yearBuilt) * 18000) flags.push('hohe km (–5%)');
  if (!flags.length) return null;
  const pct = Math.min(28, flags.length * 7);
  return flags.join(' · ') + ' → bis ' + Math.round(car.price * pct / 100).toLocaleString('de-DE') + ' € Rabatt realistisch';
}

// ── BMW CAR SVG ─────────────────────────────────────────────────────────────
function CarSVG({ color = '#2a4a7a', type = 'sedan' }) {

  if (type === 'cabrio') return (
    <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',height:'100%'}}>
      <rect x="30" y="95" width="300" height="58" rx="6" fill={body}/>

  // default sedan
  return (
    <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',height:'100%'}}>
      <rect x="22" y="95" width="316" height="58" rx="6" fill={body}/>
      <path d="M 62 95 Q 80 52 138 46 L 230 46 Q 285 46 306 95 Z" fill={body}/>
      <path d="M 74 93 Q 90 56 138 50 L 230 50 Q 278 50 296 93 Z" fill={glass} opacity="0.65"/>
      <rect x="183" y="50" width="3" height="43" fill={dark} opacity="0.35"/>
      <rect x="18" y="104" width="14" height="24" rx="2" fill="#e53935"/>
      <rect x="328" y="104" width="14" height="24" rx="2" fill="#fff9c4"/>
      <ellipse cx="82" cy="153" rx="25" ry="25" fill={wheel}/>
      <ellipse cx="82" cy="153" rx="14" ry="14" fill={rim}/>
      <ellipse cx="82" cy="153" rx="5" ry="5" fill={wheel}/>
      <ellipse cx="278" cy="153" rx="25" ry="25" fill={wheel}/>
      <ellipse cx="278" cy="153" rx="14" ry="14" fill={rim}/>
      <ellipse cx="278" cy="153" rx="5" ry="5" fill={wheel}/>
    </svg>
  );
}

function svgType(name) {
  if (name.includes('X5') || name.includes('X3')) return 'suv';
  if (name.includes('Cabriolet') || name.includes('Z4')) return 'cabrio';
  return 'sedan';
}

function quickRisk(car) {
  const dots = [];
  if (car.accidents?.length > 0) dots.push({ c: '#aac4e0' });
  if (car.owners > Math.ceil(age(car.yearBuilt) / 3)) dots.push({ c: '#aac4e0' });
  if (car.maintenanceRecords === 0) dots.push({ c: '#aac4e0' });
  if (car.km > age(car.yearBuilt) * 18000) dots.push({ c: '#aac4e0' });
  return dots;
}

// ── COST HELPERS ─────────────────────────────────────────────────────────────
function parseKw(ep) { const m = (ep||'').match(/(\d+)\s*kW/); return m ? parseInt(m[1]) : 100; }
function parseCons(c) { const m = (c||'').replace(',','.').match(/([\d.]+)\s*l/); return m ? parseFloat(m[1]) : 7; }

function estimateKfzSteuer(car) {
  const kw = parseKw(car.enginePower);
  const isDiesel = (car.fuel||'').toLowerCase().includes('diesel');
  const isElectric = (car.fuel||'').toLowerCase().includes('elektro');
  if (isElectric) return 0;
  const cc = Math.round(kw * (isDiesel ? 6.5 : 7.5));
  const base = Math.ceil(cc / 100) * (isDiesel ? 9.50 : 2.00);
  const co2 = (car.emission||'').includes('6') ? 0 : (car.emission||'').includes('5') ? 28 : 55;
  return Math.round(base + co2);
}

function estimateFuelCost(car) {
  const cons = parseCons(car.consumption);
  const isDiesel = (car.fuel||'').toLowerCase().includes('diesel');
  const isElectric = (car.fuel||'').toLowerCase().includes('elektro');
  if (isElectric) return Math.round(cons * 0.32 * 150);
  return Math.round(cons * (isDiesel ? 1.75 : 1.89) * 150);
}

function estimateInsurance(car, ageGroup) {
  const ps = parseKw(car.enginePower) * 1.36;
  const tables = {
    young:    ps > 200 ? 3200 : ps > 150 ? 2600 : ps > 100 ? 2000 : 1500,
    standard: ps > 200 ? 1100 : ps > 150 ? 850  : ps > 100 ? 650  : 480,
    senior:   ps > 200 ? 1400 : ps > 150 ? 1050 : ps > 100 ? 820  : 650,
  };
  const age = new Date().getFullYear() - car.yearBuilt;
  return Math.round(tables[ageGroup] * Math.max(0.8, 1 - age * 0.025) / 50) * 50;
}

function estimateMarketPrice(car) {
  const age = new Date().getFullYear() - car.yearBuilt;
  const hasAcc = (car.accidents||[]).length > 0;
  const markup = hasAcc ? 0.04 : age < 3 ? 0.06 : age < 6 ? 0.08 : 0.10;
  const marketAvg = Math.round(car.price * (1 + markup) / 500) * 500;
  const diff = marketAvg - car.price;
  const diffPct = Math.round(diff / marketAvg * 100);
  return { marketAvg, diff, diffPct };
}

function huStatus(hu) {
  if (!hu) return null;
  const [mm, yy] = hu.split('.').map(Number);
  const months = ((yy - new Date().getFullYear()) * 12) + (mm - (new Date().getMonth() + 1));
  if (months > 12) return { color: '#27ae60', tip: `noch ca. ${months} Monate gültig` };
  if (months > 6)  return { color: '#f39c12', tip: `noch ca. ${months} Monate gültig` };
  if (months > 0)  return { color: '#e67e22', tip: `nur noch ${months} Monat${months>1?'e':''} gültig` };
  return { color: '#c0392b', tip: 'abgelaufen' };
}

// ── KI MODAL ────────────────────────────────────────────────────────────────
function KiModal({ car, onClose, sellerMode = false }) {
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(true);
  const [ageGroup, setAgeGroup] = useState('standard');

  useEffect(() => {
    fetch(`${API}/api/cars/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(car)
    })
      .then(r => r.json())
      .then(d => { setResult(d.analysis); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <h2>🤖 KI-Fahrzeugcheck</h2>
            <div className="modal-sub">{car.name} · {car.subtitle}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">
          {loading ? (
            <div className="modal-spinner">
              <div className="sp" />
              <p>KI analysiert Fahrzeugdaten transparent…</p>
            </div>
          ) : result ? (
            <>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                <div className="modal-section-title" style={{margin:0}}>Sofort-Befunde (Regeln-Engine)</div>
                <span className={`modal-badge ${result.aiAnalysis?.model?.includes('demo') ? 'demo' : 'live'}`}>
                  {result.aiAnalysis?.model?.includes('demo') ? '● Demo-Modus' : '● Live Claude AI'}
                </span>
              </div>

              {result.findings.red.length === 0 && result.findings.orange.length === 0 && result.findings.green.map((f,i) => (
                <div key={i} className="finding-card green">
                  <div className="finding-flag">✓ {f.flag}</div>
                  <div className="finding-msg">{f.message}</div>
                  <div className="finding-tip">{f.tip}</div>
                </div>
              ))}
              {result.findings.red.map((f,i) => (
                <div key={i} className="finding-card orange">
                  <div className="finding-flag">{f.flag}</div>

// ── IMAGE SWIPER ─────────────────────────────────────────────────────────────
function ImgSwiper({ car, height = 190 }) {
  const [idx, setIdx] = useState(0);
  const [imgError, setImgError] = useState({});
  const slides = [
    { url: car.imgExterior, label: 'Exterieur' },
    { url: car.imgInterior, label: 'Interieur' },
  ].filter(s => s.url);

  const prev = (e) => { e.stopPropagation(); setIdx(i => (i - 1 + slides.length) % slides.length); };
  const next = (e) => { e.stopPropagation(); setIdx(i => (i + 1) % slides.length); };

  if (!slides.length) return (
    <div style={{height, background:`linear-gradient(135deg,${car.colorHex}20,${car.colorHex}40)`, display:'flex',alignItems:'center',justifyContent:'center'}}>
      <CarSVG color={car.colorHex} type={svgType(car.name)} />
    </div>
  );

  return (
    <div className="card-img-swiper" style={{height}}>
      <div className="swiper-track" style={{transform:`translateX(-${idx * 100}%)`}}>
        {slides.map((s, i) => (
          <div key={i} className="swiper-slide">
            {!imgError[i] ? (
              <img src={s.url} alt={s.label} onError={() => setImgError(e => ({...e,[i]:true}))} />
            ) : (
              <div className="img-fallback" style={{background:`linear-gradient(135deg,${car.colorHex}20,${car.colorHex}40)`}}>
                <CarSVG color={car.colorHex} type={svgType(car.name)} />
              </div>
            )}
          </div>
        ))}
      </div>
      {slides.length > 1 && (
        <>
          <button className="swiper-arr l" onClick={prev}>‹</button>
          <button className="swiper-arr r" onClick={next}>›</button>
          <span className="img-label">{slides[idx].label}</span>
          <div className="swiper-dots">
            {slides.map((_,i) => <div key={i} className={`swiper-dot ${i===idx?'on':''}`} onClick={e=>{e.stopPropagation();setIdx(i);}} />)}
          </div>
        </>
      )}
    </div>
  );
}

        if (!c.name.includes(ser[filters.model] || filters.model)) return false;

      if (filters.minPrice && c.price < filters.minPrice) return false;
      if (filters.maxPrice && c.price > filters.maxPrice) return false;
      if (filters.maxKm && c.km > filters.maxKm) return false;

// ── CHAT PANEL (floating) ────────────────────────────────────────────────────
function ChatPanel({ car, checkedItems = {} }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = React.useRef(null);

  const baseSuggestions = car.accidents?.length > 0
    ? ['Reparatur & Qualität', 'Preis verhandeln', 'Probefahrt-Tipps']
    : ['Kilometerstand bewerten', 'Preis einschätzen', 'Probefahrt-Tipps'];
  const unchecked = CHECKLIST.filter(item => !checkedItems[item.id]).slice(0, 2).map(item => `${item.title} prüfen`);
  const suggestions = [...baseSuggestions, ...unchecked].slice(0, 4);

  const send = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput('');
    const userMsg = { role: 'user', content: msg };
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    setLoading(true);
    try {
      const res = await fetch(`${API}/api/cars/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ carData: car, messages: newMsgs, message: msg })
      });
      const data = await res.json();
      setMessages(m => [...m, { role: 'assistant', content: data.reply }]);
    } catch {
      setMessages(m => [...m, { role: 'assistant', content: 'Antwort konnte nicht geladen werden.' }]);
    }
    setLoading(false);
    setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
  };

  function renderText(text) {
    return text.split('\n').map((line, i) => {
      const bold = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return <div key={i} dangerouslySetInnerHTML={{__html: bold || '&nbsp;'}} />;
    });
  }

  return (
    <>
      {/* Floating bubble */}
      {!open && (
        <button className="fchat-bubble" onClick={() => setOpen(true)} title="Fragen zum Fahrzeug">
          💬
        </button>
      )}

      {/* Floating chat window */}

            {suggestions.map((s, i) => (
              <button key={i} className="chat-chip" type="button" onClick={() => send(s)}>{s}</button>
            ))}

          <div className="chat-input-row" style={{flexShrink:0}}>
            <input className="chat-input" placeholder="Frage stellen…" value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && send()} />
            <button type="button" className="chat-send" onClick={() => send()} disabled={loading || !input.trim()}>Senden</button>
          </div>
        </div>
      )}
    </>
  );
}

// ── SELLER HELPERS ───────────────────────────────────────────────────────────
function generateSellerArgs(car) {
  const args = [];
  const age = new Date().getFullYear() - car.yearBuilt;
  const { marketAvg, diffPct } = estimateMarketPrice(car);

  // Stärken
  if (car.maintenanceRecords >= 7)
    args.push({ type:'strength', topic:'Lückenlose Wartung', text:`${car.maintenanceRecords} Service-Einträge – überdurchschnittlich gut gepflegt.`, tip:'Serviceheft beim Erstgespräch vorlegen. Kunden schätzen das enorm.' });
  if (car.owners === 1)
    args.push({ type:'strength', topic:'Erstbesitzer', text:'Erstbesitzer – selten bei diesem Baujahr und ein starkes Kaufargument.', tip:'Früh erwähnen: „Das Fahrzeug hatte nur einen Vorbesitzer."' });
  if ((car.accidents||[]).length === 0)
    args.push({ type:'strength', topic:'Unfallfrei', text:'Dokumentiert unfallfrei – beruhigt Käufer sofort.', tip:'Nachweis per CARFAX oder Serviceheft anbieten.' });
  if (diffPct > 0)
    args.push({ type:'strength', topic:'Preisposition', text:`Unser Preis liegt ca. ${diffPct}% unter dem Marktdurchschnitt (${marketAvg.toLocaleString('de-DE')} €).`, tip:'Bei Preisverhandlung: „Der Preis ist bereits marktgerecht kalkuliert."' });
  if (car.emission && (car.emission.includes('6') || car.emission.includes('Electric')))
    args.push({ type:'strength', topic:'Saubere Emission', text:`${car.emission} – keine Einschränkungen in Umweltzonen, auch zukünftig sicher.`, tip:'Als Argument gegen emissionsabhängige Konkurrenzangebote nutzen.' });
  if (car.hu) {
    const s = huStatus(car.hu);
    if (s && (car.hu.split('.')[1] - new Date().getFullYear()) * 12 + (car.hu.split('.')[0] - (new Date().getMonth()+1)) > 12)
      args.push({ type:'strength', topic:'HU frisch', text:`HU bis ${car.hu} gültig – Käufer hat über ein Jahr Ruhe.`, tip:'Erwähnen Sie: „Kein TÜV-Termin in absehbarer Zeit nötig."' });
  }
  if (car.km < 80000)
    args.push({ type:'strength', topic:'Niedrige Laufleistung', text:`Nur ${car.km.toLocaleString('de-DE')} km – für das Alter ${age} J. weit unterdurchschnittlich.`, tip:`Vergleichswert nennen: „Durchschnitt für ${age} Jahre: ca. ${(age*15000).toLocaleString('de-DE')} km."` });

  // Einwand-Handling
  if ((car.accidents||[]).length > 0)
    args.push({ type:'objection', topic:'Unfallschaden', text:'Schaden wurde professionell repariert. Preis reflektiert das bereits.', tip:'Reparaturrechnung bereithalten. Antwort: „Der Preis ist entsprechend kalkuliert – Sie zahlen nicht mehr als nötig."' });
  if (car.emission === 'Euro 5')
    args.push({ type:'objection', topic:'Euro 5 Fahrverbot', text:'Betrifft nur wenige Innenstadtzonen – für Pendler und Vorortfahrer irrelevant.', tip:'Fragen: „Fahren Sie regelmäßig in gesperrte Zonen?" – meistens: nein.' });
  if (car.km > 120000)
    args.push({ type:'objection', topic:'Hoher Kilometerstand', text:`BMW-Motoren sind für 300.000+ km ausgelegt. ${car.km.toLocaleString('de-DE')} km bei guter Pflege kein Problem.`, tip:'Servicehistorie als Beleg zeigen. „Schauen Sie sich die Wartungseinträge an – das Auto wurde regelmäßig gepflegt."' });
  if (!car.maintenanceRecords || car.maintenanceRecords < 4)
    args.push({ type:'objection', topic:'Wenig Servicenachweise', text:'Preis spiegelt fehlende Nachweise wider. Technische Inspektion möglich.', tip:'Proaktiv ansprechen: DEKRA/TÜV-Gutachten anbieten, das baut Vertrauen auf.' });

  const unusualColors = ['rosa','pink','lila','violett','türkis','gelb','individual'];
  if (unusualColors.some(c => (car.color||'').toLowerCase().includes(c)))
    args.push({ type:'objection', topic:'Sonderfarbe', text:'Zielgruppe ist kleiner – aber wer die Farbe sucht, zahlt oft vollen Preis.', tip:'Nicht rabattieren ohne Not. „Diese Farbe ist schwer zu finden – das wissen Liebhaber."' });

  return args;
}

// ── FAQ HELPERS ───────────────────────────────────────────────────────────────
function generateFaqs(car) {
  const age = new Date().getFullYear() - car.yearBuilt;
  const avgKm = age * 15000;
  const kmAssess = car.km < avgKm * 0.75 ? 'weit unterdurchschnittlich – sehr gut'
    : car.km < avgKm * 1.1 ? 'im normalen Bereich für das Alter'
    : 'überdurchschnittlich – auf Pflege achten';
  const steuer = estimateKfzSteuer(car);
  const sprit = estimateFuelCost(car);
  const vers = estimateInsurance(car, 'standard');
  const { marketAvg, diffPct } = estimateMarketPrice(car);
  const huInfo = car.hu ? `Die nächste HU ist am ${car.hu} fällig.` : 'Kein HU-Datum angegeben.';
  const warrantyNote = car.yearBuilt >= new Date().getFullYear() - 3
    ? 'Je nach Erstzulassung könnte noch Herstellergarantie vorhanden sein – bitte beim Händler nachfragen.'
    : 'Das Fahrzeug ist außerhalb der regulären Herstellergarantie. Eine Gebrauchtwagengarantie ist optional zubuchbar.';

  return [
    { q: `Ist der Kilometerstand von ${car.km.toLocaleString('de-DE')} km normal?`,
      a: `Für ein ${age} Jahre altes Fahrzeug wäre ein Durchschnitt von ca. ${avgKm.toLocaleString('de-DE')} km üblich. Der Kilometerstand dieses Fahrzeugs ist ${kmAssess}. BMW-Motoren sind bei regelmäßiger Wartung für 250.000–300.000 km ausgelegt.` },
    { q: `Was bedeutet ${car.emission}?`,
      a: car.emission === 'Euro 5'
        ? 'Euro 5 erfüllt ältere EU-Abgasnormen. In manchen Innenstadtzonen gibt es Fahrverbote (grüne Umweltplakette für ca. 10 € löst das). Für Pendler und Vorortfahrer ist das in der Praxis kaum relevant.'
        : `${car.emission} ist eine moderne Abgasnorm und erlaubt ist uneingeschränkte Einfahrt in alle Umweltzonen in Deutschland. Zukünftige Verschärfungen sind für dieses Fahrzeug sehr unwahrscheinlich.` },
    { q: 'Wie viel kostet mich das Auto pro Monat?',
      a: `Grobe Schätzung (ca. 15.000 km/Jahr, Altersgruppe 26–55, SF 10): Kfz-Steuer ca. ${steuer.toLocaleString('de-DE')} €/Jahr · Kraftstoff ca. ${sprit.toLocaleString('de-DE')} €/Jahr · Versicherung Haftpflicht ca. ${vers.toLocaleString('de-DE')} €/Jahr. Macht zusammen ca. ${Math.round((steuer+sprit+vers)/12).toLocaleString('de-DE')} € pro Monat – ohne Finanzierungsrate und Werkstattkosten.` },
    { q: 'Ist der Preis fair?',
      a: `Der Marktdurchschnitt vergleichbarer ${car.name}-Modelle liegt bei ca. ${marketAvg.toLocaleString('de-DE')} €. Dieses Angebot liegt ${diffPct > 0 ? `ca. ${diffPct}% darunter – ein guter Wert` : 'im Marktbereich'}. Schätzung auf Basis von Baujahr, Laufleistung und Unfallstatus.` },
    { q: `Wann ist die nächste Hauptuntersuchung (HU)?`,
      a: `${huInfo} Die HU kostet je nach Prüfstelle ca. 80–120 €. Bei bestandener Prüfung erhalten Sie die neue HU-Plakette direkt am Fahrzeug.` },
    { q: 'Hat das Fahrzeug noch Garantie?',
      a: warrantyNote },
    { q: `Wie war das Fahrzeug bisher gewartet?`,
      a: car.maintenanceRecords >= 6
        ? `Das Fahrzeug hat ${car.maintenanceRecords} Service-Einträge – das deutet auf regelmäßige, professionelle Wartung hin. Bitten Sie beim Besichtigungstermin um Einsicht ins Serviceheft.`
        : `Es liegen ${car.maintenanceRecords || 'keine'} Service-Einträge vor. Lassen Sie sich beim Termin das Serviceheft zeigen und fragen Sie nach fehlenden Wartungsintervallen.` },
    ...(car.accidents?.length > 0 ? [
      { q: 'Was bedeutet „repariertes Unfallfahrzeug"?',
        a: `Dieses Fahrzeug hatte ${car.accidents.length === 1 ? 'einen Unfall' : 'Unfälle'} (${car.accidents.map(a=>a.type).join(', ')}), der professionell repariert wurde. Der Preis reflektiert das bereits. Bestehen Sie auf Einsicht in die Reparaturrechnung und ggf. ein TÜV/DEKRA-Gutachten.` }
    ] : []),
    { q: 'Kann ich eine Probefahrt machen?',
      a: 'Ja – eine Probefahrt ist bei seriösen Händlern selbstverständlich. Achten Sie auf: ungewöhnliche Geräusche beim Anfahren, gleichmäßiges Bremsen, Lenkverhalten und Schaltgenauigkeit. Fahren Sie auch auf der Autobahn, nicht nur in der Stadt.' },
  ];
}

          {[['strategy','🏆 Strategie'],['questions','💬 Käuferfragen']].map(([k,l])=>(
            <button key={k} type="button"
              style={{flex:1,padding:'10px 0',background:tab===k?'#1a1a1a':'#333',border:'none',color:tab===k?'#fff':'#ccc',fontSize:11,fontWeight:700,cursor:'pointer',borderBottom:tab===k?'2px solid #1c69d4':'2px solid transparent'}}
              onClick={()=>{setTab(k); if(k==='questions') loadQuestions();}}>
              {l}
            </button>
          ))}
        </div>
        <div className="qlog-art">Artikel-Nr.: {artNr}</div>

        {tab === 'strategy' && <>
          <div className="seller-section-label">Verkaufsargumente ({strengths.length})</div>
          {strengths.map((a,i)=>(
            <div key={i} className="seller-arg strength">
              <div className="seller-topic">✓ {a.topic}</div>
              <div className="seller-text">{a.text}</div>
              <div className="seller-tip">💡 {a.tip}</div>
            </div>
          ))}
          {objections.length > 0 && <>
            <div className="seller-section-label">Einwand-Handling ({objections.length})</div>
            {objections.map((a,i)=>(
              <div key={i} className="seller-arg objection">
                <div className="seller-topic">! {a.topic}</div>
                <div className="seller-text">{a.text}</div>
                <div className="seller-tip">💡 {a.tip}</div>
              </div>
            ))}
          </>}
        </>}

        {tab === 'questions' && (
          <div className="qlog-wrap">
            {!qData && <div style={{color:'#888',fontSize:12,padding:'8px 0'}}>Lädt…</div>}
            {qData && qData.faq.length === 0 && qData.logs.length === 0 && (
              <div style={{color:'#888',fontSize:12}}>Noch keine Fragen gestellt. Käufer können den Chat ohne Login nutzen.</div>
            )}
            {qData && qData.faq.length > 0 && <>
              <div className="qlog-title">Häufige Käuferfragen ({qData.faq.length})</div>
              {qData.faq.map((f,i)=>(
                <div key={i} className="qlog-item">
                  <div className="qlog-q">{f.question}{f.count > 1 && <span className="qlog-badge">{f.count}×</span>}</div>
                  <div className="qlog-a">{f.answer.length > 200 ? f.answer.slice(0,200)+'…' : f.answer}</div>
                </div>
              ))}
            </>}
            {qData && qData.logs.length > 0 && <>
              <div className="qlog-title" style={{marginTop:12}}>Alle Fragen ({qData.logs.length})</div>
              {[...qData.logs].reverse().map((l,i)=>(
                <div key={i} className="qlog-item">
                  <div className="qlog-q">{l.question}</div>
                  <div className="qlog-meta">{new Date(l.ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              ))}
            </>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [cars, setCars] = useState([]);
  const [selected, setSelected] = useState(null);
  const [sellerMode, setSellerMode] = useState(false);
  const [showLogin, setShowLogin] = useState(false);

  useEffect(() => {
    fetch(`${API}/api/cars`).then(r => r.json()).then(setCars);
  }, []);

  return (
    <div>
      {showLogin && <LoginModal onLogin={()=>{setSellerMode(true);setShowLogin(false);}} onClose={()=>setShowLogin(false)} />}

      {/* TOP BAR */}
      <div className="top-bar">
        <a href="#">Händler finden</a>
        <a href="#">Mein BMW</a>
        <a href="#">Kontakt</a>
        {sellerMode
          ? <span className="seller-badge">● Händler-Modus<button className="seller-logout" onClick={()=>setSellerMode(false)}>Abmelden</button></span>
          : <a href="#" onClick={e=>{e.preventDefault();setShowLogin(true);}}>Händler-Login</a>
        }
      </div>

      {/* MAIN HEADER */}
      <div className="main-header">
        <div className="header-inner">
          <div className="bmw-logo">
            <div className="bmw-logo-circle">BMW</div>
          </div>
          <div className="header-sep" />
          <div className="header-title">
            BMW <span>Gebrauchtwagensuche.</span>
          </div>
          <div className="header-nav">
            <a href="#">Automobile</a>
            <a href="#">Motorräder</a>
            <a href="#">Services</a>
            <a href="#">Händler</a>
          </div>
        </div>
      </div>

      {selected
        ? <Detail car={selected} onBack={() => setSelected(null)} sellerMode={sellerMode} />
        : <Listing cars={cars} onSelect={setSelected} />
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
